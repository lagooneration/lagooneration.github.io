      function disableScrollForSeconds(milliseconds) {
        // Disable scroll by adding a class to the body
        document.body.style.overflow = 'hidden'; 
        document.body.classList.remove('container1');
        // You can also add a class to the body and use CSS to handle overflow
        // document.body.classList.add('disable-scroll');

        // Re-enable scroll after the specified time
        setTimeout(() => {
            enableScroll();
        }, milliseconds);
      }

      function enableScroll() {
        // Enable scroll by removing the class or resetting overflow
        document.body.style.overflow = '';
        // If using a class, you can remove it
        // document.body.classList.remove('disable-scroll');
      }

    <script>
      gsap.registerPlugin(ScrollTrigger)

      const splitTypes = document.querySelectorAll('.reveal-type')

      splitTypes.forEach((char,i) => {

          const bg = char.dataset.bgColor
          const fg = char.dataset.fgColor

          const text = new SplitType(char, { types: 'chars'})

          gsap.fromTo(text.chars, 
              {
                  color: bg,
              },
            {
                  color: fg,
                  duration: 0.3,
                  stagger: 0.02,
                  scrollTrigger: {
                      trigger: char,
                      start: 'top 80%',
                      end: 'top 20%',
                      scrub: true,
                      markers: false,
                      toggleActions: 'play play reverse reverse'
                  }
            })
      })
    </script>
